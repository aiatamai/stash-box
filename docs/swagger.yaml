info:
  contact:
    name: Stash App
    url: https://github.com/stashapp/stash-box
  description: REST API for Stash-box metadata database
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.en.html
  termsOfService: http://swagger.io/terms/
  title: Stash-box REST API
  version: "1.0"
paths:
  /edits:
    get:
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 25
        description: Items per page
        in: query
        name: per_page
        type: integer
      - description: Filter by status (PENDING, ACCEPTED, REJECTED, etc.)
        in: query
        name: status
        type: string
      - description: Filter by operation (CREATE, MODIFY, MERGE, DESTROY)
        in: query
        name: operation
        type: string
      - description: Filter by target type (SCENE, STUDIO, PERFORMER, TAG)
        in: query
        name: target_type
        type: string
      - description: Filter by creator user ID
        in: query
        name: user_id
        type: string
      - description: Sort field (created_at, updated_at, closed_at)
        in: query
        name: sort
        type: string
      - description: Sort direction (asc, desc)
        in: query
        name: direction
        type: string
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_stashapp_stash-box_internal_api_rest_handlers.PaginatedResponse'
            - properties:
                data:
                  items:
